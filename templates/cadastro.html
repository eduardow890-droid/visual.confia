<html>

<head>

<style>

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

body{
    margin:0;
    padding:0;

    background-image:url("/static/fundo2.jpeg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;


    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

    font-family:Arial;
}

.menu{
    background:darkgreen;

    width:400px;

    padding:30px;

    border-radius:20px;

    box-shadow:0px 0px 15px rgba(0,0,0,0.5);

    display:flex;

    flex-direction:column;

    gap:15px;
}

h1{
    color:white;

    text-align:center;

    margin:0;

    margin-bottom:10px;
}

label{
    color:white;

    font-size:18px;

    font-weight:bold;
}

input{
    padding:15px;

    border:none;

    border-radius:10px;

    font-size:16px;
}

input:focus{
    outline:none;

    box-shadow:0px 0px 10px lime;
}

button{
    padding:15px;

    border:none;

    border-radius:10px;

    background:limegreen;

    color:white;

    font-size:18px;

    cursor:pointer;
}

button:active{
    transform:scale(0.97);
}

</style>

</head>

<body>

<div class="menu">

<h1>Cadastro</h1>

<form action="/salvar" method="POST">

<label>Nome completo</label>
<input type="text" name="nome">

<label>CPF</label>
<input type="number" name="cpf">

<label>Data de nascimento</label>
<input type="date" name="nascimento">

<label>Telefone</label>
<input type="tel" name="telefone">

<button type="submit">Salvar</button>
</form>


<a href="/">
<button>Voltar</button>
</a>
</div>

</body>

</html>
