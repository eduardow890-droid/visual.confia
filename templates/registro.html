<html>
<head>
<style>

body{
    margin:0;
    padding:0;

    background-image:url("/static/fundo4.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial;
}

.container{
    display:flex;
    gap:20px;
    align-items:flex-start;
    flex-wrap:wrap;
    padding:20px;
}

.box{
    background:darkgreen;
    padding:20px;
    border-radius:15px;
    width:420px;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.25);
}

.box h2{
    margin-top:0;
    margin-bottom:15px;
    font-size:1.4rem;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:6px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:limegreen;
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:10px;
    margin-top:10px;
}

button:hover{
    background:#57ff57;
}

.registro-table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

.registro-table th,
.registro-table td{
    padding:12px;
    border:1px solid #2f7a2f;
}

.registro-table th{
    background:#1a4b1a;
    color:#fff;
    text-align:left;
}

.resultado-box{
    margin-top:15px;
    background:#145714;
    padding:15px;
    border-radius:12px;
    min-height:120px;
}

.registro-summary{
    margin-top:15px;
    background:#296b29;
    padding:15px;
    border-radius:10px;
    color:#fff;
}

</style>
</head>

<body>

<div class="container">

<!-- ESQUERDA -->
<div class="box">

<h2>Registrar Treino</h2>

<form action="/salvar_registro" method="POST">

<label>Aluno</label>
<select name="aluno">
    {% for a in alunos %}
        <option value="{{ a[0] }}">{{ a[1] }}</option>
    {% endfor %}
</select>

<label>Treino</label>
<select name="treino">
    {% for t in treinos %}
        <option value="{{ t[0] }}">{{ t[1] }}</option>
    {% endfor %}
</select>

<label>Descrição</label>
<input type="text" name="descricao">

<label>Pontuação</label>
<input type="number" name="pontuacao">

<button type="submit">Salvar</button>

</form>
<a href="/sistema">
<button>Voltar</button>
</a>
</div>
</div>

<!-- DIREITA -->
<div class="box">

<h2>Desempenho do Aluno</h2>

<select id="alunoSelect">
    <option value="">Selecione aluno</option>
    {% for a in alunos %}
        <option value="{{ a[0] }}">{{ a[1] }}</option>
    {% endfor %}
</select>

<div id="resultado" class="resultado-box"></div>

</div>

</div>

<script>

const registros = {{ registros | tojson }};
const select = document.getElementById("alunoSelect");
const resultado = document.getElementById("resultado");

select.addEventListener("change", function () {

    let id = parseInt(this.value);

    let filtrados = registros.filter(r => r.aluno_id === id);

    if (filtrados.length === 0){
        resultado.innerHTML = "<p>Sem registros</p>";
        return;
    }

    let total = 0;
    let linhas = filtrados.map(r => {
        total += r.pontuacao;
        return `
            <tr>
                <td>${r.treino}</td>
                <td>${r.descricao}</td>
                <td style="text-align:center;">${r.pontuacao}</td>
            </tr>
        `;
    }).join("");

    let media = total / filtrados.length;

    resultado.innerHTML = `
        <table class="registro-table">
            <thead>
                <tr>
                    <th>Treino</th>
                    <th>Descrição</th>
                    <th style="text-align:center;">Pontos</th>
                </tr>
            </thead>
            <tbody>
                ${linhas}
            </tbody>
        </table>
        <div class="registro-summary">
            <p style="margin:0;">Total de pontos: <strong>${total}</strong></p>
            <p style="margin:0;">Média: <strong>${media.toFixed(1)}</strong></p>
            <p style="margin:0;">Quantidade de treinos: <strong>${filtrados.length}</strong></p>
        </div>
    `;
});

</script>

</body>
</html>
